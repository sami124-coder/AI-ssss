services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: restaurant_decision_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - restaurant_decision_ai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d restaurant_decision_ai']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  restaurant_decision_ai_postgres:
